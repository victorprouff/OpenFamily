version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openfamily-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openfamily}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: openfamily-server
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-openfamily}
      POSTGRES_USER: ${POSTGRES_USER:-openfamily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SERVER_PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        VITE_API_URL: https://api.openfamilly.victorprouff.fr
        VITE_WS_URL: wss://api.openfamilly.victorprouff.fr
    environment:
      - VITE_API_URL=https://api.openfamilly.victorprouff.fr
      - VITE_WS_URL=wss://api.openfamilly.victorprouff.fr
    container_name: openfamily-client
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
    driver: local
